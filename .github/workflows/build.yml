---
name: Build package for openwrt-fleth-keyring

on:
  push:
    tags:
      - '*'
    branches:
      - master
      - test-ci
      - dev

jobs:
  build:
    name: Build ${{ matrix.package_type }} openwrt-fleth-keyring
    runs-on: ubuntu-24.04
    environment: runner
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - package_type: ipk
            arch: x86_64-22.03.2
          - package_type: apk
            arch: x86_64-25.12.1
    steps:
      - name: Fetch openwrt-fleth-keyring code
        uses: actions/checkout@v6
        with:
          path: huggy/openwrt-fleth-keyring

      - name: Build ${{ matrix.package_type }} openwrt-fleth-keyring
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}
          PACKAGES: openwrt-fleth-keyring
          FEEDNAME: huggy
          NO_REFRESH_CHECK: true

      - name: Prepare artifacts
        id: prepare_artifact
        run: |
          set -euo pipefail
          mkdir -p dist
          mapfile -t packages < <(find bin/packages/x86_64/huggy -maxdepth 1 -type f -name 'openwrt-fleth-keyring*.${{ matrix.package_type }}' | sort)
          if [ "${#packages[@]}" -ne 1 ]; then
            echo "Expected exactly one openwrt-fleth-keyring.${{ matrix.package_type }} package, found ${#packages[@]}."
            find bin/packages/x86_64/huggy -maxdepth 1 -type f | sort
            exit 1
          fi
          cp "${packages[0]}" dist/
          echo "path=dist/$(basename "${packages[0]}")" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          path: ${{ steps.prepare_artifact.outputs.path }}
          if-no-files-found: error
          archive: false

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ startsWith(github.ref_name, 'p') }}
          make_latest: ${{ startsWith(github.ref_name, 'p') && 'false' || 'true' }}
          files: ${{ steps.prepare_artifact.outputs.path }}
